name: Synchronisation SFTP des mods

on:
  schedule:
    - cron: '*/10 * * * *'  # Toutes les 10 minutes
  workflow_dispatch:        # Permet de lancer manuellement

jobs:
  sync_mods:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Synchroniser les mods via SFTP
        run: |
          echo "🔹 Connexion SFTP vers 91.197.6.226:27696..."
          sshpass -p "4264Mon342Aug-MSR" sftp -v -oPort=27696 -oStrictHostKeyChecking=no -b - teels_e20aa8f8a@91.197.6.226 <<EOF
          cd /
          put -r mods/*
          bye
          EOF
