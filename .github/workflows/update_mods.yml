name: Synchronisation SFTP des mods

on:
  schedule:
    - cron: '*/10 * * * *'  # Toutes les 10 minutes
  workflow_dispatch:        # Permet de lancer manuellement

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Tester la connexion SFTP
        run: |
          echo "🔹 Tentative de connexion SFTP..."
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -v -oPort=22 -oStrictHostKeyChecking=no -b - ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} <<EOF
          cd ${{ secrets.FTP_REMOTE_DIR }}
          put -r mods/*
          bye
          EOF

      - name: Vérifier les logs
        run: echo "✅ Test SFTP terminé !"
