name: Synchronisation FTP des mods

on:
  schedule:
    - cron: '*/10 * * * *'  # Toutes les 10 minutes (ajustable)
  workflow_dispatch:        # Lancement manuel possible

jobs:
  sync_mods:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Synchroniser les mods via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ${{ secrets.FTP_LOCAL_DIR }}
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/*.html
            **/index.*

      - name: Commit et push les changements
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add mods/
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Synchronisation FTP des mods"
          git push
